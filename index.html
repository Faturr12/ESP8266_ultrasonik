<!DOCTYPE html>
<html>
<head>
  <title>Ultrasonik</title>

  <style>

    body{
      font-family: Arial;
      text-align:center;
      margin-top:100px;
    }

    h1{
      font-size:40px;
    }

    #jarak{
      font-size:60px;
      color:blue;
    }

  </style>

</head>

<body>

<h1>Deteksi Ultrasonik ESP8266</h1>

<div id="jarak">0 cm</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {

  databaseURL:
  "https://iot-1-adf37-default-rtdb.asia-southeast1.firebasedatabase.app"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

db.ref("sensor/jarak").on("value", (snapshot) => {

  const data = snapshot.val();

  document.getElementById("jarak").innerHTML =
    data + " cm";

});

</script>

</body>
</html>
